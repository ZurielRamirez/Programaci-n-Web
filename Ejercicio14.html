<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 14</title>
    <link rel="stylesheet" href="css/Ejercicio10.css">
</head>
<body>

<div class="container">
    <h2>Calculadora de Arreglos</h2>
    
    <div class="form-group">
        <label for="numeros">Ingresa números separados por comas:</label>
        <input type="text" id="numeros" placeholder="Ej. 10,20,30,40,50">
        <div id="error" class="error-message">Por favor, ingresa números válidos separados por comas.</div>
    </div>

    <div class="form-group">
        <button id="btnCalcular">Calcular</button>
    </div>

    <div class="form-group">
        <label for="mayor">Número Mayor:</label>
        <input type="text" id="mayor" readonly placeholder="Esperando datos...">
    </div>

    <div class="form-group">
        <label for="menor">Número Menor:</label>
        <input type="text" id="menor" readonly placeholder="Esperando datos...">
    </div>

    <div class="form-group">
        <label for="promedio">Promedio:</label>
        <input type="text" id="promedio" readonly placeholder="Esperando datos...">
    </div>

    <p>Regresar al <a href="index.html">Menú</a></p>
</div>

<script src="js/Ejercicio14.js"></script>

</body>
</html>
