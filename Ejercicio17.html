<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 17</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/Ejercicio17.css">
</head>
<body>

<div class="container">
    <h2>Gestión de Tareas</h2>
    
    <div class="form-group">
        <label for="nuevaTarea">Nueva Tarea:</label>
        <input type="text" id="nuevaTarea" placeholder="Ej. Estudiar para el examen de Web">
        <div id="error" class="error-message">Por favor, escribe una tarea válida.</div>
    </div>

    <div class="form-group">
        <button id="btnAgregar" style="background-color: #28a745;">Agregar Tarea</button>
    </div>

    <div class="form-group">
        <label>Mis Tareas Pendientes:</label>
        <ul id="listaTareasContainer"></ul>
    </div>

    <p>Regresar al <a href="index.html">Menú</a></p>
</div>

<script src="js/Ejercicio17.js"></script>

</body>
</html>
