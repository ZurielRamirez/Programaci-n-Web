<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 18</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        
        body {
            background-color: #f4f7f6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container-custom {
            width: 100%;
            max-width: 450px;
        }
        
        .btn-sm-custom {
            padding: 4px 8px;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container-custom p-3">
    <div class="card shadow border-0 rounded-4 p-4 bg-white">
        <h2 class="text-center text-dark mb-4 fw-bold">Lista Dinámica </h2>
        
        <div class="mb-3">
            <label for="nuevoElemento" class="form-label fw-semibold text-secondary">Escribe un nuevo elemento:</label>
            <input type="text" id="nuevoElemento" class="form-control p-2" placeholder="Ej. Comprar fruta">
        </div>

        <div class="mb-4">
            <button id="agregarBtn" class="btn btn-primary w-100 fw-bold p-2">Agregar a la lista</button>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold text-secondary">Elementos agregados:</label>
            <ul id="lista" class="list-group">
                </ul>
        </div>

        <p class="text-center mt-3 mb-0 fs-6">
            Regresar al <a href="index.html" class="text-decoration-none fw-bold">Menú</a>
        </p>
    </div>
</div>

<script src="js/Ejercicio18.js"></script>
</body>
</html>
