<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 10</title>
    <link rel="stylesheet" href="css/Ejercicio10.css">
</head>
<body>

<div class="container">
    <h2>Conversor de Temperatura</h2>
    
    <div class="form-group">
        <label for="celsius">Grados Celsius (°C):</label>
        <input type="text" id="celsius" placeholder="Ej. 25">
        <div id="error" class="error-message">Por favor, ingresa un numero valido.</div>
    </div>

    <div class="form-group">
        <button id="btnConvertir">Convertir</button>
    </div>

    <div class="form-group">
        <label for="fahrenheit">Grados Fahrenheit (°F):</label>
        <input type="text" id="fahrenheit" readonly placeholder="La conversion es:">
    </div>
    <p>Regresar al <a href="index.html">Menú</a></p>
</div>

<script src="js/Ejercicio10.js"></script>

</body>
</html>
